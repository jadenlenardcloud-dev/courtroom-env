name: courtroom-argument-simulator
version: "1.0.0"
description: >
  A real-world reinforcement learning environment simulating criminal defense 
  proceedings. The AI agent acts as a defense attorney navigating opening 
  statements, witness examination, cross-examination, and closing arguments.
  Tasks range from petty theft with a clear alibi to premeditated murder with
  purely circumstantial evidence.

author: "Gayathri036"
license: MIT
tags:
  - legal
  - nlp
  - multi-phase
  - real-world
  - language-agent
  - openenv

environment:
  class: CourtroomEnvironment
  module: environment
  spec_version: "1.0"
  entry_point: "app:app"
  port: 7860

tasks:
  - id: task_easy
    name: "The Shoplifting Alibi"
    difficulty: easy
    max_turns: 10
    target_score: 0.65
    description: "Defend against petty theft charge with strong documented alibi."

  - id: task_medium
    name: "The Embezzlement Trial"
    difficulty: medium
    max_turns: 15
    target_score: 0.50
    description: "Defend CFO against $2.1M embezzlement with conflicting expert witnesses."

  - id: task_hard
    name: "The Premeditated Murder Trial"
    difficulty: hard
    max_turns: 20
    target_score: 0.40
    description: "Defend against first-degree murder with hostile jury and circumstantial-only evidence."

observation_space:
  type: dict
  fields:
    turn: int
    max_turns: int
    phase: str
    charge: str
    defendant_profile: dict
    current_witness: dict
    evidence_available: list
    prosecution_last_move: str
    jury_mood: float
    judge_patience: float
    case_strength: float
    objections_remaining: int
    message: str

action_space:
  type: dict
  fields:
    action_type: str
    content: str
    target: str

reward:
  type: float
  range: [-1.0, 1.0]

endpoints:
  reset: "POST /reset"
  step: "POST /step"
  state: "GET /state/{session_id}"
  health: "GET /health"

runtime:
  max_episode_minutes: 5
  total_baseline_minutes: 20
  docker_image: "courtroom-env:latest"
  python_version: "3.11"

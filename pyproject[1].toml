[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "courtroom-argument-simulator"
version = "1.0.0"
description = "An OpenEnv-compliant RL environment simulating criminal defense proceedings."
authors = [{ name = "Gayathri036" }]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "openai>=1.0.0",
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = ["pytest", "httpx"]

[tool.setuptools.packages.find]
where = ["."]

[project.urls]
Homepage = "https://huggingface.co/spaces/Gayathri036/courtroom-argument-simulator"
